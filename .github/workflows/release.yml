name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release body
        id: body
        run: |
          chmod +x .github/scripts/generate-release-body.sh
          .github/scripts/generate-release-body.sh "${{ steps.tag.outputs.tag }}" > /tmp/release-body.md
          echo "body=/tmp/release-body.md" >> $GITHUB_OUTPUT
      - name: Create draft release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: skills++ ${{ steps.tag.outputs.tag }}
          body_path: ${{ steps.body.outputs.body }}
          draft: true

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm --filter desktop tauri build ${{ matrix.args }}

      - name: Rename and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#v}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"

          case "${{ matrix.platform }}" in
            macos-latest)
              PLATFORM="macOS"
              if echo "${{ matrix.args }}" | grep -q "aarch64"; then
                ARCH="arm64"
              else
                ARCH="x86_64"
              fi
              # DMG
              for f in "$BUNDLE_DIR/dmg"/*.dmg; do [ -f "$f" ] || continue; mv "$f" "skills++-v${VERSION}-${PLATFORM}-${ARCH}.dmg"; done
              # .app.tar.gz
              for f in "$BUNDLE_DIR/macos"/*.app.tar.gz; do [ -f "$f" ] || continue; mv "$f" "skills++-v${VERSION}-${PLATFORM}-${ARCH}.tar.gz"; done
              ;;
            ubuntu-22.04)
              PLATFORM="Linux"; ARCH="x86_64"
              for f in "$BUNDLE_DIR/appimage"/*.AppImage; do [ -f "$f" ] || continue; mv "$f" "skills++-v${VERSION}-${PLATFORM}-${ARCH}.AppImage"; done
              for f in "$BUNDLE_DIR/deb"/*.deb; do [ -f "$f" ] || continue; mv "$f" "skills++-v${VERSION}-${PLATFORM}-${ARCH}.deb"; done
              for f in "$BUNDLE_DIR/rpm"/*.rpm; do [ -f "$f" ] || continue; mv "$f" "skills++-v${VERSION}-${PLATFORM}-${ARCH}.rpm"; done
              ;;
            windows-latest)
              PLATFORM="Windows"; ARCH="x86_64"
              for f in "$BUNDLE_DIR/msi"/*.msi; do [ -f "$f" ] || continue; mv "$f" "skills++-v${VERSION}-${PLATFORM}-${ARCH}.msi"; done
              for f in "$BUNDLE_DIR/nsis"/*.exe; do [ -f "$f" ] || continue; mv "$f" "skills++-v${VERSION}-${PLATFORM}-${ARCH}-setup.exe"; done
              ;;
          esac

          # Upload all renamed artifacts to the draft release
          gh release upload "$TAG" skills++-v${VERSION}-* --clobber

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          draft: false
